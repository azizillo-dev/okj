version: '3.8'

# ==============================================================================
# OKJ PLATFORM - DOCKER COMPOSE ORCHESTRATION
# Nega bitta fayl: 10,000–20,000 foydalanuvchili startap uchun barcha xizmatlarni
# (Django, Postgres, Redis, Celery, Nginx) yagona VPS da 1 klik bilan ko'tarish.
# ==============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: okj_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-okj_db}
      POSTGRES_USER: ${POSTGRES_USER:-okj_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-okj_secure_password_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-okj_user} -d ${POSTGRES_DB:-okj_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: okj_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: okj_web
    restart: always
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build: .
    container_name: okj_celery_worker
    restart: always
    command: celery -A config worker -l info --concurrency=4
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      web:
        condition: service_started
      redis:
        condition: service_healthy

  celery_beat:
    build: .
    container_name: okj_celery_beat
    restart: always
    command: celery -A config beat -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      web:
        condition: service_started

  nginx:
    image: nginx:alpine
    container_name: okj_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
