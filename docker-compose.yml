version: '3.8'

# ==============================================================================
# OKJ PLATFORM - DOCKER COMPOSE ORCHESTRATION
# Nega bitta fayl: 10,000–20,000 foydalanuvchili startap uchun barcha xizmatlarni
# (Django, Postgres, Redis, Celery, Nginx, Certbot) yagona VPS da 1 klik bilan ko'tarish.
#
# XAVFSIZLIK ARXITEKTURASI:
# - postgres va redis portlari tashqariga ochilmagan (faqat ichki docker tarmog'i)
# - Redis parol bilan himoyalangan (REDIS_PASSWORD env o'zgaruvchisi orqali)
# - Nginx Let's Encrypt (Certbot) SSL integratsiyasiga tayyor
# ==============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: okj_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-okj_db}
      POSTGRES_USER: ${POSTGRES_USER:-okj_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ports: OLIB TASHLANDI — Postgres faqat ichki docker tarmog'ida ishlaydi
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-okj_user} -d ${POSTGRES_DB:-okj_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: okj_redis
    restart: always
    # Redis kuchli parol bilan himoyalangan — internetga portlar ochilmagan
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    # ports: OLIB TASHLANDI — Redis faqat ichki docker tarmog'ida ishlaydi
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: okj_web
    restart: always
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build: .
    container_name: okj_celery_worker
    restart: always
    command: celery -A config worker -l info --concurrency=4
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      web:
        condition: service_started
      redis:
        condition: service_healthy

  celery_beat:
    build: .
    container_name: okj_celery_beat
    restart: always
    command: celery -A config beat -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      web:
        condition: service_started

  nginx:
    image: nginx:alpine
    container_name: okj_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      # Let's Encrypt sertifikatlari uchun umumiy volume
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - web

  certbot:
    image: certbot/certbot:latest
    container_name: okj_certbot
    # Sertifikat yangilash: docker compose run --rm certbot renew
    command: certonly --webroot --webroot-path=/var/www/certbot --email ${CERTBOT_EMAIL} --agree-tos --no-eff-email -d ${DOMAIN}
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    profiles:
      - certbot

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  certbot_www:
  certbot_conf:
