# ==============================================================================
# OKJ PLATFORM - NGINX CONFIGURATION (HTTP IP & HTTPS DOMAIN READY)
# Nega kerak: Hozircha IP orqali (http://45.148.29.33) to'g'ridan-to'g'ri ishlashi
# va kelajakda domen ulanganda SSL orqali ishlashi uchun tayyorlangan.
# ==============================================================================

upstream okj_backend {
    server web:8000;
}

# ----------------------------------------------------------------
# HTTP (80-port) server bloki — IP va Domen orqali to'g'ridan-to'g'ri ishlash
# ----------------------------------------------------------------
server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 50M;

    # Let's Encrypt ACME challenge uchun
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API va Web so'rovlarini yo'naltirish
    location / {
        proxy_pass http://okj_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (Django Channels / Realtime Chat) uchun yo'naltirish
    location /ws/ {
        proxy_pass http://okj_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Statik fayllarni Nginx orqali tezkor tarqatish
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        access_log off;
    }

    # Media fayllar
    location /media/ {
        alias /app/media/;
        expires 7d;
        access_log off;
    }
}
