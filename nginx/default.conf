# ==============================================================================
# OKJ PLATFORM - NGINX REVERSE PROXY CONFIGURATION
# Nega Nginx kerak: Gunicorn/Daphne oldida xavfsizlik qalqoni, static fayllar kashi
# va WebSocket (ws://) ulanishlarni to'g'ri yo'naltirish (Upgrade header) uchun.
# ==============================================================================

upstream okj_backend {
    server web:8000;
}

server {
    listen 80;
    server_name localhost api.okj.uz;

    client_max_body_size 50M;

    # Xavfsizlik sarlavhalari (Security headers)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # API va Web so'rovlarini yo'naltirish
    location / {
        proxy_pass http://okj_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (Django Channels / Realtime Chat) uchun yo'naltirish
    location /ws/ {
        proxy_pass http://okj_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Statik fayllarni Nginx orqali tezkor tarqatish
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        access_log off;
    }

    # Media fayllar (Agar R2 o'rniga lokal ishlatilsa)
    location /media/ {
        alias /app/media/;
        expires 7d;
        access_log off;
    }
}
