# ==============================================================================
# OKJ PLATFORM - NGINX REVERSE PROXY + SSL CONFIGURATION
# Nega kerak: Gunicorn/Daphne oldida xavfsizlik qalqoni, static fayllar kashi,
# Let's Encrypt SSL (443 port) va WebSocket ulanishlarni to'g'ri yo'naltirish.
#
# Ishga tushirish:
#   1. Avval 80-port bilan Certbot sertifikat oling:
#      docker compose --profile certbot run --rm certbot
#   2. Nginx ni qayta ishga tushiring: docker compose restart nginx
# ==============================================================================

upstream okj_backend {
    server web:8000;
}

# ----------------------------------------------------------------
# HTTP → HTTPS yo'naltirish (Let's Encrypt webroot challenge uchun ruxsat berilgan)
# ----------------------------------------------------------------
server {
    listen 80;
    server_name api.okj.uz;

    # Let's Encrypt ACME challenge uchun
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Barcha HTTP so'rovlarni HTTPS ga yo'naltirish
    location / {
        return 301 https://$host$request_uri;
    }
}

# ----------------------------------------------------------------
# HTTPS (SSL) server bloki — asosiy konfiguratsiya
# ----------------------------------------------------------------
server {
    listen 443 ssl;
    server_name api.okj.uz;

    ssl_certificate /etc/letsencrypt/live/api.okj.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.okj.uz/privkey.pem;

    # Mozilla Intermediate SSL konfiguratsiyasi (TLS 1.2+)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    client_max_body_size 50M;

    # Xavfsizlik sarlavhalari (Security headers)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API va Web so'rovlarini yo'naltirish
    location / {
        proxy_pass http://okj_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (Django Channels / Realtime Chat) uchun yo'naltirish
    location /ws/ {
        proxy_pass http://okj_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Statik fayllarni Nginx orqali tezkor tarqatish
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        access_log off;
    }

    # Media fayllar (Agar R2 o'rniga lokal ishlatilsa)
    location /media/ {
        alias /app/media/;
        expires 7d;
        access_log off;
    }
}
