[tool.ruff]
line-length = 160
exclude = [
    "migrations",
    ".git",
    "__pycache__",
    "staticfiles",
    "media",
    ".venv",
    "venv",
]

[tool.ruff.lint]
select = ["E", "F"]
ignore = [
    "E402",  # Module level import not at top of file (common in Django settings & asgi)
    "F403",  # from .base import * used; unable to detect undefined names
    "F405",  # name may be undefined, or defined from star imports
    "F841",  # Local variable assigned to but never used (common when creating test objects)
]

